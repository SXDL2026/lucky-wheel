<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c0392b">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 24px;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,215,0,0.8);
      color: #ffd700;
    }
    .wheel-wrap {
      position: relative;
      width: 360px;
      height: 360px;
      margin-bottom: 32px;
    }
    canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(255,215,0,0.4); }
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 36px solid #ffd700;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      z-index: 10;
    }
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700, #e67e00);
      border: 4px solid white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      z-index: 10;
      transition: transform 0.1s;
    }
    .center-btn:hover { transform: translate(-50%, -50%) scale(1.08); }
    .center-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .result-box {
      min-height: 64px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
      letter-spacing: 2px;
      transition: all 0.3s;
    }
    .result-box .prize { font-size: 2rem; margin-top: 6px; }
    .history {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
    .history span {
      display: inline-block;
      margin: 2px 4px;
      padding: 2px 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🎡 幸运转盘</h1>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheel" width="360" height="360"></canvas>
  <button class="center-btn" id="spinBtn" onclick="spin()">抽奖</button>
</div>

<div class="result-box" id="result">点击转盘开始抽奖</div>
<div class="history" id="history"></div>

<script>
const prizes = [
  { label: '星巴克',  emoji: '☕', color: '#27ae60' },
  { label: '再来一次', emoji: '🔄', color: '#8e44ad' },
  { label: 'AirPods', emoji: '🎧', color: '#2980b9' },
  { label: '谢谢参与', emoji: '😊', color: '#7f8c8d' },
  { label: 'iPhone',  emoji: '📱', color: '#c0392b' },
  { label: '百元红包', emoji: '🧧', color: '#e67e22' },
  { label: '谢谢参与', emoji: '😊', color: '#7f8c8d' },
  { label: '周边礼品', emoji: '🎁', color: '#16a085' },
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const total = prizes.length;
const arc = (2 * Math.PI) / total;
let currentAngle = 0;
let spinning = false;
const history = [];

function drawWheel(angle) {
  ctx.clearRect(0, 0, 360, 360);
  const cx = 180, cy = 180, r = 170;

  prizes.forEach((p, i) => {
    const start = angle + i * arc;
    const end = start + arc;

    // 扇形
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 文字
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'white';
    ctx.font = 'bold 14px Microsoft YaHei';
    ctx.fillText(p.label, r - 10, 5);
    ctx.font = '18px serif';
    ctx.fillText(p.emoji, r - 80, 6);
    ctx.restore();
  });

  // 中心圆
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('result').innerHTML = '转动中...';

  const extra = 5 + Math.floor(Math.random() * 5); // 5-9圈
  const stopAt = Math.random() * 2 * Math.PI;
  const totalRotation = extra * 2 * Math.PI + stopAt;
  const duration = 4000;
  const start = performance.now();
  const startAngle = currentAngle;

  function ease(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalRotation * ease(t);
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showResult();
    }
  }

  requestAnimationFrame(frame);
}

function showResult() {
  // 指针在顶部（-π/2），计算指向哪个奖品
  const normalized = ((-currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const index = Math.floor(normalized / arc) % total;
  const prize = prizes[index];

  document.getElementById('result').innerHTML =
    `🎉 恭喜获得<br><span class="prize">${prize.emoji} ${prize.label}</span>`;

  history.unshift(prize.emoji + prize.label);
  if (history.length > 8) history.pop();
  document.getElementById('history').innerHTML =
    '历史记录：' + history.map(h => `<span>${h}</span>`).join('');
}

drawWheel(0);
</script>

</body>
</html>
